<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emlak Günlükleri CRM</title>
    <meta name="description" content="Modern, hızlı ve görsel odaklı emlak yönetim sistemi.">
    <link rel="icon" type="image/png" href="C:\Users\Ayşe Nur\.gemini\antigravity\brain\43a0619f-a66c-445b-99c0-c4cfa9b1aedb\media__1775298588218.png">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="logo-container" style="margin-bottom: 2rem; text-align: center;">
                <img src="C:\Users\Ayşe Nur\.gemini\antigravity\brain\43a0619f-a66c-445b-99c0-c4cfa9b1aedb\media__1775298588218.png" 
                     alt="Emlak Günlükleri Logo" 
                     style="max-width: 200px; height: auto;">
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="login_user">Kullanıcı Adı</label>
                <input type="text" id="login-username" class="form-input" placeholder="admin">
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="login_pass">Şifre</label>
                <input type="password" id="login-password" class="form-input" placeholder="1234">
                <div style="display: flex; align-items: center; gap: 0.4rem; margin-top: 0.5rem;">
                    <input type="checkbox" id="show-password" style="width: 14px; height: 14px; cursor: pointer;">
                    <label for="show-password" style="font-size: 0.75rem; color: var(--text-secondary); cursor: pointer;" data-i18n="show_psw">Şifreyi Göster</label>
                </div>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem;">
                <input type="checkbox" id="login-remember" style="width: 16px; height: 16px; cursor: pointer;">
                <label for="login-remember" style="font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;" data-i18n="stay_logged_in">Sürekli Açık Tut</label>
            </div>
            <button class="btn btn-primary" id="login-submit" style="width: 100%; justify-content: center; margin-top: 0.5rem;" data-i18n="login_btn">Giriş Yap</button>
            <p id="login-error" style="color: var(--accent-red); font-size: 0.8rem; margin-top: 0.5rem; display: none; text-align: center;"></p>
            <p style="font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 1.5rem;">Emlak Günlükleri CRM v1.2</p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" style="display: none;">
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header" style="text-align: center; margin-bottom: 2.5rem; position: relative;">
                <img src="C:\Users\Ayşe Nur\.gemini\antigravity\brain\43a0619f-a66c-445b-99c0-c4cfa9b1aedb\media__1775298588218.png" 
                     alt="Emlak Günlükleri Logo" 
                     style="max-width: 70px; height: auto;">
                <div class="lang-switcher" style="display: flex; gap: 0.8rem; justify-content: center; margin-top: 1rem;">
                    <div id="lang-tr" class="lang-btn" title="Türkçe" style="cursor:pointer; opacity:1; transition: opacity 0.2s;">
                        <svg xmlns="http://www.w3.org/2001/svg" width="24" height="18" viewBox="0 0 1200 800">
                            <rect width="1200" height="800" fill="#E30A17"/><circle cx="425" cy="400" r="200" fill="#fff"/><circle cx="475" cy="400" r="160" fill="#E30A17"/><polygon points="583.3,400 454.2,441.9 503.5,331.9 503.5,468.1 454.2,358.1" fill="#fff" transform="translate(150,0)"/></svg>
                    </div>
                    <div id="lang-en" class="lang-btn" title="English" style="cursor:pointer; opacity:0.4; transition: opacity 0.2s;">
                        <svg xmlns="http://www.w3.org/2001/svg" width="24" height="18" viewBox="0 0 60 30">
                            <clipPath id="s"><path d="M0,0 v30 h60 v-30 z"/></clipPath><path d="M0,0 v30 h60 v-30 z" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#s)" stroke="#C8102E" stroke-width="4"/><path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/><path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></svg>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="nav-sale">
                    <i data-lucide="home"></i>
                    <span data-i18n="nav_sale">Satılık</span>
                </a>
                <a href="#" class="nav-item" id="nav-rent">
                    <i data-lucide="key"></i>
                    <span data-i18n="nav_rent">Kiralık</span>
                </a>
                <a href="#" class="nav-item" id="nav-customers">
                    <i data-lucide="users"></i>
                    <span data-i18n="nav_customers">Tüm Müşteriler</span>
                </a>
                <div id="admin-only-nav" style="display: none;">
                    <!-- Dynamically rendered -->
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="C:\Users\Ayşe Nur\.gemini\antigravity\brain\43a0619f-a66c-445b-99c0-c4cfa9b1aedb\media__1775298588218.png" 
                         alt="User Profile Logo" 
                         style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover;">
                    <div class="user-info">
                        <span class="user-name" id="current-user-name">?</span>
                        <span class="user-status" id="current-user-role">?</span>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
                    <button class="btn btn-secondary" id="user-settings-btn" style="font-size: 0.7rem; justify-content: center;">
                        <i data-lucide="settings"></i> <span data-i18n="nav_psw_change">Şifre Değiştir</span>
                    </button>
                    <button class="btn btn-secondary" id="logout-btn" style="font-size: 0.75rem; justify-content: center;" data-i18n="nav_logout">
                        Çıkış Yap
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-container">
            <header class="main-header">
                <div class="header-left">
                    <h1 id="board-title">...</h1>
                </div>
                <div class="header-right">
                    <div id="property-actions" style="display: flex; gap: 1rem;">
                        <div class="search-box">
                            <i data-lucide="search"></i>
                            <input type="text" id="search-input">
                        </div>
                        <button class="btn btn-primary" id="add-item-btn">
                            <!-- Injected by JS -->
                        </button>
                    </div>
                </div>
            </header>
            <div class="content-scrollable">
                <div class="board-view" id="board-view"></div>
            </div>
        </main>
        <div id="mobile-toggle" class="mobile-nav-toggle"><i data-lucide="menu"></i></div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="modal-title-h2">...</h2>
                <button id="close-modal"><i data-lucide="x"></i></button>
            </header>
            <div class="modal-body" id="modal-body"></div>
            <footer class="modal-footer">
                <div id="delete-container"></div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-secondary" id="cancel-modal" data-i18n="btn_cancel">İptal</button>
                    <button class="btn btn-primary" id="save-modal" data-i18n="btn_save">Kaydet</button>
                </div>
            </footer>
        </div>
    </div>

    <div class="modal-overlay" id="user-settings-modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2 data-i18n="nav_psw_change">Şifre Değiştir</h2>
                <button id="close-user-modal"><i data-lucide="x"></i></button>
            </header>
            <div class="modal-body">
                <div class="form-group"><label class="form-label" data-i18n="old_psw">Eski Şifre</label><input type="password" id="old-password" class="form-input"></div>
                <div class="form-group"><label class="form-label" data-i18n="new_psw">Yeni Şifre</label><input type="password" id="new-password" class="form-input"></div>
                <div class="form-group"><label class="form-label" data-i18n="new_psw_repeat">Yeni Şifre (Yeniden)</label><input type="password" id="new-password-repeat" class="form-input"></div>
            </div>
            <footer class="modal-footer">
                <button class="btn btn-secondary" id="cancel-user-modal" data-i18n="btn_cancel">İptal</button>
                <button class="btn btn-primary" id="save-user-password" data-i18n="btn_update">Güncelle</button>
            </footer>
        </div>
    </div>

    <div class="modal-overlay" id="consultant-modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="consultant-modal-title">...</h2>
                <button id="close-consultant-modal"><i data-lucide="x"></i></button>
            </header>
            <div class="modal-body" id="consultant-modal-body">
                <div class="form-group"><label class="form-label" data-i18n="th_cust_name">Ad Soyad</label><input type="text" id="con-name" class="form-input"></div>
                <div class="form-group"><label class="form-label" data-i18n="login_user">Kullanıcı Adı</label><input type="text" id="con-username" class="form-input"></div>
                <div class="form-group">
                    <label class="form-label" data-i18n="login_pass">Şifre</label>
                    <input type="password" id="con-password" class="form-input">
                    <div style="display: flex; align-items: center; gap: 0.4rem; margin-top: 0.5rem;">
                        <input type="checkbox" id="con-show-password"><label for="con-show-password" style="font-size:0.75rem;" data-i18n="show_psw">GİZLE/GÖSTER</label>
                    </div>
                </div>
                <div class="form-group"><label class="form-label" data-i18n="th_status">Durum</label><select id="con-status" class="form-select"><option value="active">Aktif</option><option value="passive">Pasif</option></select></div>
            </div>
            <footer class="modal-footer">
                <button class="btn btn-secondary" id="cancel-consultant-modal" data-i18n="btn_cancel">İptal</button>
                <button class="btn btn-primary" id="save-consultant-btn" data-i18n="btn_save">Kaydet</button>
            </footer>
        </div>
    </div>

    <script src="app.js"></script>
    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirm-modal-overlay" style="z-index: 3000; display: none;">
        <div class="modal-content" style="max-width: 400px; text-align: center; padding: 2.5rem; position: relative;">
            <div style="width: 64px; height: 64px; background: #fee2e2; color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i data-lucide="alert-triangle" style="width: 32px; height: 32px;"></i>
            </div>
            <h3 style="font-family: var(--font-heading); font-size: 1.25rem; margin-bottom: 0.5rem;" id="confirm-title">Emin misiniz?</h3>
            <p id="confirm-msg" style="color: var(--text-secondary); margin-bottom: 2rem;">Bu işlem geri alınamaz.</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <button class="btn btn-secondary" id="confirm-no" style="width: 100%;">HAYIR</button>
                <button class="btn btn-primary" id="confirm-yes" style="background: var(--accent-red); border-color: var(--accent-red); width: 100%;">EVET, SİL</button>
            </div>
        </div>
    </div>
</body>
</html>
